<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style/style.css" />
    <title>Document</title>
</head>

<body>
    <header>
        <div class="container">
            <div class="header">
                <div class="header__logo">
                    <img src="./img/logo.svg" alt="logo" />
                </div>

                <ul class="header__ul" id="header__ul">
                    <li class="header__li" data-category="1">
                        <a href="#">Триллер</a>
                    </li>
                    <li class="header__li" data-category="2">
                        <a href="#">Криминал</a>
                    </li>
                    <li class="header__li" data-category="6">
                        <a href="#">Фантастика</a>
                    </li>
                    <li class="header__li" data-category="24">
                        <a href="#">Аниме</a>
                    </li>
                </ul>

                <div class="header__input">
                    <input type="text" name="headerInput" id="headerInput" placeholder="Введите название " />
                    <button type="button" id="headerBtn">Поиск</button>
                </div>

                <label for="genres">Выберите жанр:</label>
                <select id="genresSelect" name="genresChoise">
                </select>

            </div>
        </div>
    </header>

    <section>
        <div class="container">
            <div class="movies" id="movies"></div>
        </div>
    </section>
    <script type="module" src="main.js"></script>
</body>

</html>
