<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>Document</title>
</head>
<body> 
    <header>
        <div class="container">
            <div class="header">
                <div class="header__logo">
                    <img src="./img/logo.svg" alt="logo">
                </div>
                <div class="header__list" id="header__list">
                    <ul class="header__ul" id="header__ul">
                        <a href="#" data-category="drama"><li>Драма</li></a>
                        <a href="#"data-category="action"><li>Боевик</li></a>
                        <a href="#" data-category="comedy"><li>Комедия</li></a>
                        <a href="#" data-category="horror"><li>Ужасы</li></a>
                    </ul>
                </div>
                <div class="header__input">
                    <input type="text" name="headerInput" id="headerInput" placeholder="Enter movie name">
                    <button type="button" id="headerBtn">Search</button>
                </div>
            </div>
        </div>
    </header>

    <section>
        <div class="container">
            <div class="movies" id="movies">
            </div>
        </div>
    </section>
    <script type="module" src="main.js"></script>
</body>
</html>
